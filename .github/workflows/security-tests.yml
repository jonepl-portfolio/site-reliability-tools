name: Security Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test-certbot:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f security/tests/Dockerfile -t test-cert-script .

      - name: Run test script
        run: |
          chmod +x ./security/tests/test_certbot.sh
          ./security/tests/test_certbot.sh

      - name: Clean up Docker containers
        run: |
          docker rm -f test-cert-script || true
          docker rmi -f test-cert-script || true