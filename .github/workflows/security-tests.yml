name: Security Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  validate-docker-compose:
    name: Validate Docker Compose Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/$(curl -s https://api.github.com/repos/docker/compose/releases/latest | jq -r .tag_name)/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      - name: Validate Docker Compose Files
        run: |
          docker-compose -f security/docker-compose.yml config
          docker-compose -f security/docker-compose.local.yml config

  test-certbot:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f security/tests/Dockerfile -t test-cert-script .

      - name: Run test script
        run: |
          chmod +x ./security/tests/test_certbot.sh
          ./security/tests/test_certbot.sh

      - name: Clean up Docker containers
        run: |
          docker rm -f test-cert-script || true
          docker rmi -f test-cert-script || true